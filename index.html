<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Working with multi APIs</title>
  </head>
  <body>
    <header id="main-header">
      <h1>Weather Forcast Application</h1>
    </header>

    <main>
      <section>
        <button data-city="Chicago">Chicago</button>
        <button data-city="New York">New York</button>
        <button data-city="Los Angeles">Los Angeles</button>
      </section>

      <section id="weather">
        <p>Select a city to see the weather</p>
      </section>
    </main>
    <footer>
      <p>Weather data from Open-Meteo and location data from OpenCage</p>
    </footer>
    <script src="js/API.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
