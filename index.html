<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- added fonts from google for css styling -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- css is linked below -->
    <link rel="stylesheet" href="css/main.css" />
    <title>Working with multi APIs</title>
  </head>
  <body>
    <header id="main-header">
      <h1>Weather Forecast Application</h1>
    </header>

    <main>
      <section id="city-container">
        <button data-city="Chicago">Chicago</button>
        <button data-city="New York">New York</button>
        <button data-city="Los Angeles">Los Angeles</button>
        <button data-city="Miami">Miami</button>
        <button data-city="Seattle">Seattle</button>
        <button data-city="Denver">Denver</button>
      </section>

      <section id="weather">
        <p>Select a city to see the weather</p>
      </section>
    </main>
    <footer>
      <p>
        Weather data from
        <a
          href="https://open-meteo.com/"
          target="_blank"
          rel="noopener noreferrer"
        >
          Open-Meteo
        </a>
        and location data from
        <a
          href="https://opencagedata.com/"
          target="_blank"
          rel="noopener noreferrer"
        >
          OpenCage
        </a>
      </p>
    </footer>
    <!-- js is linked below -->
    <script src="js/main.js" type="module"></script>
  </body>
</html>
